---

---
<main class="stack">
    <h1>{{tag}}</h1>
    <nav class="main-navigation">
        <ul role="list">
            {{#each items}}
                <li><a href="{{permalink}}">{{title}}</a></li>
            {{/each}}
        </ul>
    </nav>
    {{#each items}}
        <article>
            <h3><a href="{{permalink}}">{{title}}</a></h3>
            <p>{{intro}}</p>
        </article>
    {{/each}}
</main>
